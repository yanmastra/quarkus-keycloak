name: Publish Extensions to GitHub Packages

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
  workflow_dispatch:
    inputs:
      extension:
        description: 'Extension to publish (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - quarkus-base
          - quarkus-authentication
          - quarkus-authorization
          - quarkus-microservices-common
          - quarkus-error-mail-notification

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      quarkus-base: ${{ steps.result.outputs.quarkus-base }}
      quarkus-authentication: ${{ steps.result.outputs.quarkus-authentication }}
      quarkus-authorization: ${{ steps.result.outputs.quarkus-authorization }}
      quarkus-microservices-common: ${{ steps.result.outputs.quarkus-microservices-common }}
      quarkus-error-mail-notification: ${{ steps.result.outputs.quarkus-error-mail-notification }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed extensions (push)
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            quarkus-base:
              - 'extensions/quarkus-base/**'
            quarkus-authentication:
              - 'extensions/quarkus-authentication/**'
            quarkus-authorization:
              - 'extensions/quarkus-authorization/**'
            quarkus-microservices-common:
              - 'extensions/quarkus-microservices-common/**'
            quarkus-error-mail-notification:
              - 'extensions/quarkus-error-mail-notification/**'

      - name: Resolve which extensions to publish
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            EXT="${{ inputs.extension }}"
            for name in quarkus-base quarkus-authentication quarkus-authorization quarkus-microservices-common quarkus-error-mail-notification; do
              if [ "$EXT" = "all" ] || [ "$EXT" = "$name" ]; then
                echo "${name}=true" >> "$GITHUB_OUTPUT"
              else
                echo "${name}=false" >> "$GITHUB_OUTPUT"
              fi
            done
          else
            echo "quarkus-base=${{ steps.changes.outputs.quarkus-base }}" >> "$GITHUB_OUTPUT"
            echo "quarkus-authentication=${{ steps.changes.outputs.quarkus-authentication }}" >> "$GITHUB_OUTPUT"
            echo "quarkus-authorization=${{ steps.changes.outputs.quarkus-authorization }}" >> "$GITHUB_OUTPUT"
            echo "quarkus-microservices-common=${{ steps.changes.outputs.quarkus-microservices-common }}" >> "$GITHUB_OUTPUT"
            echo "quarkus-error-mail-notification=${{ steps.changes.outputs.quarkus-error-mail-notification }}" >> "$GITHUB_OUTPUT"
          fi

  publish-quarkus-base:
    needs: detect-changes
    if: needs.detect-changes.outputs.quarkus-base == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Generate settings.xml
        run: |
          cat > $GITHUB_WORKSPACE/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
      - name: Build and publish
        run: mvn deploy -DskipTests -s $GITHUB_WORKSPACE/settings.xml
        working-directory: extensions/quarkus-base
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-quarkus-authentication:
    needs: [detect-changes, publish-quarkus-base]
    if: |
      always() &&
      needs.detect-changes.outputs.quarkus-authentication == 'true' &&
      (needs.publish-quarkus-base.result == 'success' || needs.publish-quarkus-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Generate settings.xml
        run: |
          cat > $GITHUB_WORKSPACE/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
      - name: Install quarkus-base locally
        run: mvn install -DskipTests
        working-directory: extensions/quarkus-base
      - name: Build and publish
        run: mvn deploy -DskipTests -s $GITHUB_WORKSPACE/settings.xml
        working-directory: extensions/quarkus-authentication
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-quarkus-authorization:
    needs: [detect-changes, publish-quarkus-base]
    if: |
      always() &&
      needs.detect-changes.outputs.quarkus-authorization == 'true' &&
      (needs.publish-quarkus-base.result == 'success' || needs.publish-quarkus-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Generate settings.xml
        run: |
          cat > $GITHUB_WORKSPACE/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
      - name: Install quarkus-base locally
        run: mvn install -DskipTests
        working-directory: extensions/quarkus-base
      - name: Build and publish
        run: mvn deploy -DskipTests -s $GITHUB_WORKSPACE/settings.xml
        working-directory: extensions/quarkus-authorization
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-quarkus-microservices-common:
    needs: [detect-changes, publish-quarkus-base]
    if: |
      always() &&
      needs.detect-changes.outputs.quarkus-microservices-common == 'true' &&
      (needs.publish-quarkus-base.result == 'success' || needs.publish-quarkus-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Generate settings.xml
        run: |
          cat > $GITHUB_WORKSPACE/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
      - name: Install quarkus-base locally
        run: mvn install -DskipTests
        working-directory: extensions/quarkus-base
      - name: Build and publish
        run: mvn deploy -DskipTests -s $GITHUB_WORKSPACE/settings.xml
        working-directory: extensions/quarkus-microservices-common
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-quarkus-error-mail-notification:
    needs: [detect-changes, publish-quarkus-base]
    if: |
      always() &&
      needs.detect-changes.outputs.quarkus-error-mail-notification == 'true' &&
      (needs.publish-quarkus-base.result == 'success' || needs.publish-quarkus-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Generate settings.xml
        run: |
          cat > $GITHUB_WORKSPACE/settings.xml << 'SETTINGS'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          SETTINGS
      - name: Install quarkus-base locally
        run: mvn install -DskipTests
        working-directory: extensions/quarkus-base
      - name: Build and publish
        run: mvn deploy -DskipTests -s $GITHUB_WORKSPACE/settings.xml
        working-directory: extensions/quarkus-error-mail-notification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
