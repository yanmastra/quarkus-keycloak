# Custom Keycloak Login Theme
# Extends the base 'keycloak' theme and overrides specific templates and styles

parent=keycloak
import=common/keycloak

# Override specific templates
login=login.ftl
login-reset-password=login-reset-password.ftl
login-update-password=login-update-password.ftl
login-page-expired=login-page-expired.ftl
login-verify-email=login-verify-email.ftl
error=error.ftl

# Internationalization
internationalizationEnabled=false
defaultLocale=en

# Stylesheets — loaded in order, each overrides the previous
styles=css/login.css

# Scripts
scripts=js/login.js
