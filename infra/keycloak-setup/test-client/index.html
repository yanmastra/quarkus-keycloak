<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keycloak Theme Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2.5rem; max-width: 480px; width: 90%; text-align: center; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p.sub { color: #666; margin-bottom: 2rem; font-size: 0.95rem; }
    button { background: #4f46e5; color: #fff; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4338ca; }
    button.logout { background: #dc2626; margin-top: 1rem; }
    button.logout:hover { background: #b91c1c; }
    .user-info { text-align: left; margin-top: 1.5rem; }
    .user-info h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #4f46e5; }
    .field { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #eee; }
    .field .label { font-weight: 600; color: #555; }
    .field .value { color: #333; }
    .status { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; font-size: 0.85rem; }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>Keycloak Theme Tester</h1>
    <p class="sub">Test your custom login theme</p>
    <button onclick="login()">Login with Keycloak</button>
  </div>

  <script>
    // --- Configuration ---
    const KEYCLOAK_URL = 'https://test.something.com';
    const REALM = 'my-realm';
    const CLIENT_ID = 'web-app';
    const REDIRECT_URI = window.location.origin + '/index.html';
    const SCOPES = 'openid profile email';

    const AUTH_URL = `${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/auth`;
    const TOKEN_URL = `${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/token`;
    const USERINFO_URL = `${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/userinfo`;
    const LOGOUT_URL = `${KEYCLOAK_URL}/realms/${REALM}/protocol/openid-connect/logout`;

    // --- PKCE Helpers ---
    function generateRandomString(length) {
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      return Array.from(array, b => b.toString(16).padStart(2, '0')).join('').slice(0, length);
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(digest)))
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=+$/, '');
    }

    // --- Auth Flow ---
    async function login() {
      const state = generateRandomString(32);
      const codeVerifier = generateRandomString(64);
      const codeChallenge = await generateCodeChallenge(codeVerifier);

      sessionStorage.setItem('pkce_state', state);
      sessionStorage.setItem('pkce_code_verifier', codeVerifier);

      const params = new URLSearchParams({
        response_type: 'code',
        client_id: CLIENT_ID,
        redirect_uri: REDIRECT_URI,
        scope: SCOPES,
        state: state,
        code_challenge: codeChallenge,
        code_challenge_method: 'S256'
      });

      window.location.href = `${AUTH_URL}?${params}`;
    }

    async function exchangeCode(code) {
      const codeVerifier = sessionStorage.getItem('pkce_code_verifier');

      const params = new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: CLIENT_ID,
        code: code,
        redirect_uri: REDIRECT_URI,
        code_verifier: codeVerifier
      });

      const res = await fetch(TOKEN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error_description || err.error || 'Token exchange failed');
      }

      return res.json();
    }

    async function fetchUserInfo(accessToken) {
      const res = await fetch(USERINFO_URL, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });

      if (!res.ok) throw new Error('Failed to fetch user info');
      return res.json();
    }

    function logout() {
      const idToken = sessionStorage.getItem('id_token');
      sessionStorage.clear();

      const params = new URLSearchParams({
        post_logout_redirect_uri: REDIRECT_URI,
        id_token_hint: idToken || ''
      });

      window.location.href = `${LOGOUT_URL}?${params}`;
    }

    function showUser(userInfo, tokenData) {
      const app = document.getElementById('app');

      // Decode the access token payload for extra info
      const payload = JSON.parse(atob(tokenData.access_token.split('.')[1]));

      app.innerHTML = `
        <h1>Logged In</h1>
        <div class="status success">Authentication successful via PKCE flow</div>
        <div class="user-info">
          <h2>User Info</h2>
          <div class="field"><span class="label">Username</span><span class="value">${userInfo.preferred_username || '-'}</span></div>
          <div class="field"><span class="label">Name</span><span class="value">${userInfo.name || '-'}</span></div>
          <div class="field"><span class="label">Email</span><span class="value">${userInfo.email || '-'}</span></div>
          <div class="field"><span class="label">Email Verified</span><span class="value">${userInfo.email_verified || false}</span></div>
          <div class="field"><span class="label">Realm Roles</span><span class="value">${(payload.realm_access?.roles || []).join(', ') || '-'}</span></div>
          <div class="field"><span class="label">Token Expires</span><span class="value">${new Date(payload.exp * 1000).toLocaleTimeString()}</span></div>
        </div>
        <button class="logout" onclick="logout()">Logout</button>
      `;
    }

    function showError(message) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <h1>Keycloak Theme Tester</h1>
        <div class="status error">${message}</div>
        <br>
        <button onclick="login()">Try Again</button>
      `;
    }

    // --- Handle Callback ---
    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');

      if (error) {
        showError(`Keycloak error: ${params.get('error_description') || error}`);
        return;
      }

      if (!code) return; // No callback, show login button

      // Verify state
      const savedState = sessionStorage.getItem('pkce_state');
      if (state !== savedState) {
        showError('State mismatch — possible CSRF attack');
        return;
      }

      // Clean URL
      window.history.replaceState({}, document.title, window.location.pathname);

      try {
        const tokenData = await exchangeCode(code);
        sessionStorage.setItem('id_token', tokenData.id_token);

        const userInfo = await fetchUserInfo(tokenData.access_token);
        showUser(userInfo, tokenData);
      } catch (err) {
        showError(err.message);
      }
    }

    handleCallback();
  </script>
</body>
</html>
